name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build (Release)
        run: |
          xcodebuild \
            -project MotivationalScreensaver.xcodeproj \
            -scheme MotivationalScreensaver \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/build" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Locate & package .saver
        run: |
          SAVER=$(find "$RUNNER_TEMP/build" -name "MotivationalScreensaver.saver" -type d | head -1)
          echo "Found: $SAVER"
          cp -R "$SAVER" .
          cp INSTALL.md .
          zip -r MotivationalScreensaver.zip MotivationalScreensaver.saver INSTALL.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MotivationalScreensaver.zip
          body: |
            ## Motivational Screensaver ${{ github.ref_name }}

            Download `MotivationalScreensaver.zip`, unzip it, and double-click `MotivationalScreensaver.saver` to install.

            See `INSTALL.md` inside the zip for full instructions (including the one-time security step for macOS Gatekeeper).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
